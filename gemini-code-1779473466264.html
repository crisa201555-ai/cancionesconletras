<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - KaraokeVerse</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-color: #45f3ff;
            --text-main: #ffffff;
            --text-muted: #c5a1ff;
            --input-bg: #121212;
            --error-color: #ff4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            text-align: center;
        }

        .auth-container h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--accent-color);
            font-size: 1.8rem;
        }

        .auth-container p {
            color: #8c96a0;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: #c5cdd6;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid #333f4f;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #666d7a;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333f4f;
        }

        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        .btn-google {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background-color: #f1f1f1;
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        .toggle-auth {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #a0aab5;
        }

        .toggle-auth span {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
        }

        .toggle-auth span:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--error-color);
            background-color: rgba(255, 74, 74, 0.1);
            border: 1px solid var(--error-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="authTitle">Iniciar Sesión</h2>
        <p id="authSubtitle">Ingresa tus datos para empezar a cantar</p>

        <!-- Caja de Alertas/Errores -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Formulario Tradicional -->
        <form id="authForm">
            <div class="form-group">
                <label for="email">CORREO ELECTRÓNICO</label>
                <input type="email" id="email" required placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="btnSubmit">Entrar</button>
        </form>

        <div class="divider">O CONTINÚA CON</div>

        <!-- Botón de Google -->
        <button type="button" class="btn btn-google" id="btnGoogle">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google Logo">
            Google
        </button>

        <!-- Alternar entre Login y Registro -->
        <div class="toggle-auth">
            <span id="toggleText">¿No tienes cuenta? Regístrate aquí</span>
        </div>
    </div>

    <!-- SCRIPTS DE FIREBASE (Uso de módulos nativos de ES6) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-analytics.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // Tus credenciales del proyecto cancionesconletras
        const firebaseConfig = {
            apiKey: "AIzaSyCxlVM-b8r9m3l_10ENL0fgjsf7Dtm1Eoo",
            authDomain: "cancionesconletras.firebaseapp.com",
            projectId: "cancionesconletras",
            storageBucket: "cancionesconletras.firebasestorage.app",
            messagingSenderId: "1079542189727",
            appId: "1:1079542189727:web:4d6d2daaeb5fa708fe1caa",
            measurementId: "G-FDC30G0TXM"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // Control de estado de la interfaz (true = login, false = registro)
        let isLoginState = true;

        // Elementos del DOM
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnGoogle = document.getElementById('btnGoogle');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const toggleText = document.getElementById('toggleText');
        const errorMessage = document.getElementById('errorMessage');

        // Mostrar errores formateados
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function clearError() {
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';
        }

        // Alternar el modo de la interfaz (Login <-> Registro)
        toggleText.addEventListener('click', () => {
            isLoginState = !isLoginState;
            clearError();
            
            if (isLoginState) {
                authTitle.textContent = "Iniciar Sesión";
                authSubtitle.textContent = "Ingresa tus datos para empezar a cantar";
                btnSubmit.textContent = "Entrar";
                toggleText.textContent = "¿No tienes cuenta? Regístrate aquí";
            } else {
                authTitle.textContent = "Crear Cuenta";
                authSubtitle.textContent = "Regístrate de forma gratuita en la plataforma";
                btnSubmit.textContent = "Registrarme";
                toggleText.textContent = "¿Ya tienes una cuenta? Inicia sesión";
            }
        });

        // Evento de Envío de Formulario (Correo/Contraseña)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                if (isLoginState) {
                    // Acción: Iniciar Sesión
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    console.log("Sesión iniciada:", userCredential.user);
                    window.location.href = "home.html"; // Redirección exitosa
                } else {
                    // Acción: Crear Usuario Nuevo
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    console.log("Usuario creado:", userCredential.user);
                    window.location.href = "home.html"; // Redirección exitosa
                }
            } catch (error) {
                console.error("Error de autenticación:", error.code);
                // Mapeo de errores comunes de Firebase Auth al español
                switch (error.code) {
                    case 'auth/invalid-credential':
                        showError('Las credenciales no son válidas. Verifica tu correo o contraseña.');
                        break;
                    case 'auth/email-already-in-use':
                        showError('Este correo electrónico ya se encuentra registrado.');
                        break;
                    case 'auth/weak-password':
                        showError('La contraseña debe tener al menos 6 caracteres.');
                        break;
                    case 'auth/invalid-email':
                        showError('El formato del correo electrónico no es válido.');
                        break;
                    case 'auth/missing-password':
                        showError('Por favor, ingresa una contraseña.');
                        break;
                    default:
                        showError('Ocurrió un error inesperado: ' + error.message);
                }
            }
        });

        // Evento para Inicio de Sesión / Registro con Google
        btnGoogle.addEventListener('click', async () => {
            clearError();
            try {
                const result = await signInWithPopup(auth, googleProvider);
                console.log("Autenticado con Google:", result.user);
                window.location.href = "home.html"; // Redirección exitosa
            } catch (error) {
                console.error("Error con Google Popup:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError('Error al conectar con Google. Inténtalo de nuevo.');
                }
            }
        });
    </script>
</body>
</html>
