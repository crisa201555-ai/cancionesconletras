<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Karaoke | Canciones Con Letras</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #04060a;
            --surface: rgba(18, 24, 38, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2fe;
            --accent-purple: #9b51e0;
            --text-main: #f3f4f6;
            --text-muted: #4b5563;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(180deg, rgba(155, 81, 224, 0.05) 0%, transparent 100%);
            color: var(--text-main); margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        nav {
            background: rgba(11, 15, 24, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--surface-border);
            padding: 16px 40px; display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }

        .btn-back { display: flex; align-items: center; gap: 8px; color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600; }
        .btn-back:hover { color: var(--accent-cyan); }

        .song-title-nav { display: flex; align-items: center; gap: 20px; text-align: left; }
        .title-block h2 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .title-block p { margin: 2px 0 0 0; font-size: 0.8rem; color: var(--accent-cyan); font-weight: 600; text-transform: uppercase; }

        .btn-sync-tool {
            display: flex; align-items: center; gap: 6px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border); color: var(--text-main); padding: 8px 14px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; text-decoration: none; transition: all 0.2s ease;
        }
        .btn-sync-tool:hover { background: rgba(0, 242, 254, 0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 242, 254, 0.15); }

        .lyrics-container { flex-grow: 1; overflow-y: auto; padding: 120px 20px; display: flex; flex-direction: column; align-items: center; gap: 28px; scroll-behavior: smooth; }
        .lyrics-container::-webkit-scrollbar { display: none; }

        .lyric-line { font-size: 1.8rem; font-weight: 700; color: var(--text-muted); text-align: center; max-width: 700px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .lyric-line.active { color: #ffffff; font-size: 2.3rem; transform: scale(1.05); text-shadow: 0 0 20px rgba(0, 242, 254, 0.6), 0 0 40px rgba(155, 81, 224, 0.4); }
        .lyric-line.passed { color: rgba(255, 255, 255, 0.2); }

        .controls-footer { background: rgba(11, 15, 24, 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--surface-border); padding: 24px 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        .audio-wrapper { width: 100%; max-width: 650px; display: flex; align-items: center; gap: 15px; }
        audio { width: 100%; height: 40px; border-radius: 30px; outline: none; }
        .credits-box { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <nav>
        <a href="home.html" class="btn-back">
            <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
            <span>Volver al buscador</span>
        </a>
        
        <div class="song-title-nav">
            <div class="title-block">
                <h2 id="trackTitle">Cargando canción...</h2>
                <p id="trackArtist">Artista</p>
            </div>
            <a href="karaoke/sendlyrics.html" class="btn-sync-tool" id="btnGoToSync">
                <i data-lucide="clock" style="width: 14px; height: 14px;"></i>
                <span>Sincronizar letra...</span>
            </a>
        </div>
        <div style="width: 140px;"></div>
    </nav>

    <div class="lyrics-container" id="lyricsContainer"></div>

    <div class="controls-footer">
        <div class="audio-wrapper">
            <audio id="audioPlayer" controls></audio>
        </div>
        <div class="credits-box" id="creditsBox"></div>
    </div>

    <script>
        const cancionesLetras = {
            "sin-destino-fijo": {
                title: "Sin Destino Fijo",
                artist: "ElCiaa",
                audioSrc: "sindestinofijo.mp3",
                composers: "Cristóbal Ignacio A.",
                productors: "4K2",
                lines: [
                    { time: 0, text: "🎵 (Instrumental)" },
                    { time: 4, text: "Agarré mi mochila, dejé todo atrás" }
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const artistKey = urlParams.get('artist') || 'elciaa';
        const songKey = urlParams.get('song') || 'sin-destino-fijo';
        const songData = cancionesLetras[songKey];

        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const audioPlayer = document.getElementById('audioPlayer');
        const creditsBox = document.getElementById('creditsBox');
        const btnGoToSync = document.getElementById('btnGoToSync');

        // Construcción de la URL relativa correcta hacia el subdirectorio
        btnGoToSync.href = `karaoke/sendlyrics.html?artist=${encodeURIComponent(artistKey)}&song=${encodeURIComponent(songKey)}`;

        if (songData) {
            trackTitle.textContent = songData.title;
            trackArtist.textContent = songData.artist;
            audioPlayer.src = songData.audioSrc;
            
            creditsBox.innerHTML = `<span>Compositores: <strong>${songData.composers}</strong></span> <span>Productores: <strong>${songData.productors}</strong></span>`;

            songData.lines.forEach((line, index) => {
                const p = document.createElement('p');
                p.classList.add('lyric-line');
                p.textContent = line.text;
                p.id = `line-${index}`;
                p.addEventListener('click', () => { audioPlayer.currentTime = line.time; });
                lyricsContainer.appendChild(p);
            });

            audioPlayer.addEventListener('timeupdate', () => {
                const currentTime = audioPlayer.currentTime;
                let activeIndex = -1;
                for (let i = 0; i < songData.lines.length; i++) {
                    if (currentTime >= songData.lines[i].time) { activeIndex = i; } else { break; }
                }
                songData.lines.forEach((_, index) => {
                    const el = document.getElementById(`line-${index}`);
                    if (index === activeIndex) {
                        el.className = 'lyric-line active';
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else if (index < activeIndex) {
                        el.className = 'lyric-line passed';
                    } else {
                        el.className = 'lyric-line';
                    }
                });
            });
        } else {
            trackTitle.textContent = "Canción no encontrada";
            lyricsContainer.innerHTML = `<p class="lyric-line active">Próximamente disponible.</p>`;
        }
        lucide.createIcons();
    </script>
</body>
</html>
