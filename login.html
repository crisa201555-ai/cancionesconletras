<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar a Canciones Con Letras</title>
    <!-- Iconos Lucide para un aspecto moderno y profesional -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #04060a;
            --surface: rgba(18, 24, 38, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2fe;
            --accent-purple: #9b51e0;
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
            --input-bg: rgba(7, 10, 17, 0.85);
            --error-red: #ff4d6d;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            /* Fondo de luces de neón fluidas usando múltiples gradientes radiales */
            background-image: 
                radial-gradient(at 10% 10%, rgba(0, 242, 254, 0.15) 0px, transparent 45%),
                radial-gradient(at 90% 90%, rgba(155, 81, 224, 0.15) 0px, transparent 45%),
                radial-gradient(at 50% 50%, rgba(0, 242, 254, 0.05) 0px, transparent 60%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* Pantalla de carga inicial */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top-color: var(--accent-cyan);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Contenedor Principal Ultra-Glassmorphism con Borde Iluminado */
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--surface-border);
            padding: 45px 40px 35px 40px;
            border-radius: 28px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* Efecto de brillo de fondo detrás de la tarjeta */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 30px;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        /* Logo animado */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .brand-icon-wrapper {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            padding: 10px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3);
        }

        .brand i {
            color: #000;
        }

        .brand span {
            font-size: 1.7rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Banner de estadísticas o reclamos de marketing */
        .promo-badge {
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.1), rgba(155, 81, 224, 0.1));
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #00f2fe;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0 auto 24px auto;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-pulse {
            width: 6px;
            height: 6px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 12px var(--accent-cyan); }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .auth-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .auth-header p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #4b5563;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 15px 16px 15px 48px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: #0b111e;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
        }

        .form-group input:focus + i {
            color: var(--accent-cyan);
        }

        /* Botón de envío gradiente */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.25);
            margin-top: 26px;
        }

        .btn-primary:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 8px 26px rgba(0, 242, 254, 0.45);
            opacity: 0.95;
        }

        .btn-primary:active {
            transform: translateY(0.5px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 26px 0;
            color: #4b5563;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.8px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .divider:not(:empty)::before { margin-right: 1.2rem; }
        .divider:not(:empty)::after { margin-left: 1.2rem; }

        /* Botón de Google */
        .btn-google {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-main);
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        .auth-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer span {
            color: var(--accent-cyan);
            cursor: pointer;
            font-weight: 700;
            transition: color 0.2s;
        }

        .auth-footer span:hover {
            text-decoration: underline;
            color: #fff;
        }

        /* Bloque de estadísticas inferior integrado */
        .stats-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-number {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, var(--accent-cyan), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .error-container {
            background: rgba(255, 77, 109, 0.12);
            border: 1px solid rgba(255, 77, 109, 0.25);
            color: #ff859b;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Capa de bloqueo para cargar datos -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-card">
        <!-- Nombre Oficial e Identidad -->
        <div class="brand">
            <div class="brand-icon-wrapper">
                <i data-lucide="music-4" style="width: 22px; height: 22px;"></i>
            </div>
            <span>Canciones Con Letras</span>
        </div>

        <div class="auth-header">
            <!-- Badge dinámico promocional -->
            <div class="promo-badge">
                <div class="badge-pulse"></div>
                <span>Más de 500 canciones para cantar</span>
            </div>
            <h2 id="authTitle">Bienvenido de nuevo</h2>
            <p id="authSubtitle">Inicia sesión para acceder a tu catálogo de música sincronizada</p>
        </div>

        <!-- Alertas de Error -->
        <div class="error-container" id="errorBlock">
            <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span id="errorText"></span>
        </div>

        <!-- Formulario central -->
        <form id="authForm">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required placeholder="nombre@correo.com" autocomplete="email">
                    <i data-lucide="mail" style="width: 18px; height: 18px;"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="••••••••" minlength="6" autocomplete="current-password">
                    <i data-lucide="lock" style="width: 18px; height: 18px;"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="btnSubmit">
                <span>Entrar</span>
                <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </form>

        <div class="divider">O CONTINÚA CON</div>

        <button type="button" class="btn btn-google" id="btnGoogle">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google Logo">
            <span>Google</span>
        </button>

        <div class="auth-footer">
            <p id="toggleWrapper">¿No tienes cuenta? <span id="toggleText">Regístrate gratis</span></p>
        </div>

        <!-- Sección de estadísticas del ecosistema -->
        <div class="stats-footer">
            <div class="stat-item">
                <span class="stat-number">500+</span>
                <span class="stat-label">Pistas</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">100%</span>
                <span class="stat-label">Sincro</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">Gratis</span>
                <span class="stat-label">Siempre</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // Tus credenciales vinculadas
        const firebaseConfig = {
            apiKey: "AIzaSyCxlVM-b8r9m3l_10ENL0fgjsf7Dtm1Eoo",
            authDomain: "cancionesconletras.firebaseapp.com",
            projectId: "cancionesconletras",
            storageBucket: "cancionesconletras.firebasestorage.app",
            messagingSenderId: "1079542189727",
            appId: "1:1079542189727:web:4d6d2daaeb5fa708fe1caa",
            measurementId: "G-FDC30G0TXM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let isLoginState = true;

        const loadingOverlay = document.getElementById('loadingOverlay');
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnGoogle = document.getElementById('btnGoogle');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const toggleText = document.getElementById('toggleText');
        const errorBlock = document.getElementById('errorBlock');
        const errorText = document.getElementById('errorText');

        // Escucha automática de sesión activa para saltar el login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Sesión verificada de manera segura. Entrando a la app...");
                window.location.replace("home.html"); 
            } else {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.visibility = 'hidden';
                }, 400);
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorBlock.style.display = 'flex';
        }

        function clearError() {
            errorText.textContent = '';
            errorBlock.style.display = 'none';
        }

        // Alternar estados (Login / Registro) con textos contextuales mejorados
        toggleText.addEventListener('click', () => {
            isLoginState = !isLoginState;
            clearError();
            
            if (isLoginState) {
                authTitle.textContent = "Bienvenido de nuevo";
                authSubtitle.textContent = "Inicia sesión para acceder a tu catálogo de música sincronizada";
                btnSubmit.querySelector('span').textContent = "Entrar";
                toggleText.textContent = "Regístrate gratis";
                document.getElementById('toggleWrapper').firstChild.textContent = "¿No tienes cuenta? ";
            } else {
                authTitle.textContent = "Crea tu cuenta";
                authSubtitle.textContent = "Únete para acceder de inmediato a todas las letras en tiempo real";
                btnSubmit.querySelector('span').textContent = "Crear Cuenta";
                toggleText.textContent = "Inicia sesión";
                document.getElementById('toggleWrapper').firstChild.textContent = "¿Ya eres miembro? ";
            }
        });

        // Envío tradicional por correo
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            
            btnSubmit.disabled = true;
            btnSubmit.style.opacity = '0.7';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                if (isLoginState) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                btnSubmit.disabled = false;
                btnSubmit.style.opacity = '1';
                console.error("Error Auth:", error.code);
                
                switch (error.code) {
                    case 'auth/invalid-credential':
                        showError('Los datos ingresados no coinciden con ninguna cuenta.');
                        break;
                    case 'auth/email-already-in-use':
                        showError('Esta dirección de correo ya está registrada.');
                        break;
                    case 'auth/weak-password':
                        showError('La seguridad de la contraseña es muy baja (mínimo 6 caracteres).');
                        break;
                    case 'auth/invalid-email':
                        showError('El correo electrónico tiene un formato incorrecto.');
                        break;
                    default:
                        showError('Error en la comunicación. Revisa tu conexión.');
                }
            }
        });

        // Autenticación por Google Popup
        btnGoogle.addEventListener('click', async () => {
            clearError();
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                console.error("Google Auth Error:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError('No se pudo establecer conexión con las cuentas de Google.');
                }
            }
        });

        // Inicializar iconos vectoriales
        lucide.createIcons();
    </script>
</body>
</html>
