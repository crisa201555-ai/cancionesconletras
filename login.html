<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar a Canciones Con Letras</title>
    <!-- Iconos Lucide para un aspecto moderno y profesional -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #06090e;
            --surface: rgba(22, 31, 44, 0.65);
            --surface-border: rgba(255, 255, 255, 0.08);
            --accent: #45f3ff;
            --accent-glow: rgba(69, 243, 255, 0.35);
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
            --input-bg: rgba(10, 15, 24, 0.7);
            --error-red: #ff4d6d;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            /* Fondo dinámico con gradientes abstractos */
            background-image: 
                radial-gradient(at 0% 0%, rgba(69, 243, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 161, 255, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Pantalla de carga inicial silenciosa */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Contenedor Principal Glassmorphism */
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .brand i {
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .brand span {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .auth-header p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Formulario Estilizado */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #4b5563;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(10, 15, 24, 0.9);
            box-shadow: 0 0 16px rgba(69, 243, 255, 0.15);
        }

        .form-group input:focus + i {
            color: var(--accent);
        }

        /* Botones */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn-primary {
            background: var(--accent);
            color: #04060a;
            box-shadow: 0 4px 20px rgba(69, 243, 255, 0.2);
            margin-top: 28px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(69, 243, 255, 0.4);
            opacity: 0.95;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: #4b5563;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after { margin-left: 1rem; }

        .btn-google {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        .auth-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer span {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .auth-footer span:hover {
            text-decoration: underline;
        }

        .error-container {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.2);
            color: #ff859b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Capa de bloqueo para validar sesión previa -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-card">
        <!-- Nombre e Identidad del Proyecto -->
        <div class="brand">
            <i data-lucide="music-4" style="width: 26px; height: 26px;"></i>
            <span>Canciones Con Letras</span>
        </div>

        <div class="auth-header">
            <h2 id="authTitle">Bienvenido de nuevo</h2>
            <p id="authSubtitle">Inicia sesión para acceder a tus pistas sincronizadas</p>
        </div>

        <!-- Alertas de Error -->
        <div class="error-container" id="errorBlock">
            <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <span id="errorText"></span>
        </div>

        <!-- Formulario central -->
        <form id="authForm">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required placeholder="nombre@correo.com" autocomplete="email">
                    <i data-lucide="mail" style="width: 18px; height: 18px;"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="••••••••" minlength="6" autocomplete="current-password">
                    <i data-lucide="lock" style="width: 18px; height: 18px;"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="btnSubmit">
                <span>Entrar</span>
                <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </form>

        <div class="divider">O CONTINÚA CON</div>

        <button type="button" class="btn btn-google" id="btnGoogle">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google Logo">
            <span>Google</span>
        </button>

        <div class="auth-footer">
            <p id="toggleWrapper">¿No tienes cuenta? <span id="toggleText">Regístrate gratis</span></p>
        </div>
    </div>

    <!-- Firebase JS Core y Módulos de Autenticación -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // Configuración oficial vinculada a cancionesconletras
        const firebaseConfig = {
            apiKey: "AIzaSyCxlVM-b8r9m3l_10ENL0fgjsf7Dtm1Eoo",
            authDomain: "cancionesconletras.firebaseapp.com",
            projectId: "cancionesconletras",
            storageBucket: "cancionesconletras.firebasestorage.app",
            messagingSenderId: "1079542189727",
            appId: "1:1079542189727:web:4d6d2daaeb5fa708fe1caa",
            measurementId: "G-FDC30G0TXM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let isLoginState = true;

        const loadingOverlay = document.getElementById('loadingOverlay');
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnGoogle = document.getElementById('btnGoogle');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const toggleText = document.getElementById('toggleText');
        const errorBlock = document.getElementById('errorBlock');
        const errorText = document.getElementById('errorText');

        // Escucha si hay una sesión previa activa para saltarse el Login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Sesión activa encontrada. Redirigiendo a la Home de Canciones Con Letras...");
                window.location.replace("home.html"); 
            } else {
                // Desvanecer el overlay de carga si se requiere autenticación
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.visibility = 'hidden';
                }, 400);
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorBlock.style.display = 'flex';
        }

        function clearError() {
            errorText.textContent = '';
            errorBlock.style.display = 'none';
        }

        // Alternar vistas
        toggleText.addEventListener('click', () => {
            isLoginState = !isLoginState;
            clearError();
            
            if (isLoginState) {
                authTitle.textContent = "Bienvenido de nuevo";
                authSubtitle.textContent = "Inicia sesión para acceder a tus pistas sincronizadas";
                btnSubmit.querySelector('span').textContent = "Entrar";
                toggleText.textContent = "Regístrate gratis";
                document.getElementById('toggleWrapper').firstChild.textContent = "¿No tienes cuenta? ";
            } else {
                authTitle.textContent = "Crea tu cuenta";
                authSubtitle.textContent = "Únete para guardar tus letras favoritas y cantar";
                btnSubmit.querySelector('span').textContent = "Crear Cuenta";
                toggleText.textContent = "Inicia sesión";
                document.getElementById('toggleWrapper').firstChild.textContent = "¿Ya eres miembro? ";
            }
        });

        // Envío tradicional por correo
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            
            btnSubmit.disabled = true;
            btnSubmit.style.opacity = '0.7';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                if (isLoginState) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                btnSubmit.disabled = false;
                btnSubmit.style.opacity = '1';
                console.error("Error Auth:", error.code);
                
                switch (error.code) {
                    case 'auth/invalid-credential':
                        showError('Los datos ingresados no coinciden con ninguna cuenta.');
                        break;
                    case 'auth/email-already-in-use':
                        showError('Esta dirección de correo ya está registrada.');
                        break;
                    case 'auth/weak-password':
                        showError('La seguridad de la contraseña es muy baja (mínimo 6 caracteres).');
                        break;
                    case 'auth/invalid-email':
                        showError('El correo electrónico tiene un formato incorrecto.');
                        break;
                    default:
                        showError('Error en la comunicación. Revisa tu conexión.');
                }
            }
        });

        // Acceso directo con Google Popup
        btnGoogle.addEventListener('click', async () => {
            clearError();
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                console.error("Google Auth Error:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError('No se pudo establecer conexión con las cuentas de Google.');
                }
            }
        });

        // Inicializar iconos SVG vectoriales
        lucide.createIcons();
    </script>
</body>
</html>
