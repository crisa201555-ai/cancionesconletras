<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizador de Letras | SendLyrics</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #04060a;
            --surface: rgba(18, 24, 38, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2fe;
            --accent-purple: #9b51e0;
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 50% 0%, rgba(0, 242, 254, 0.05) 0px, transparent 50%);
            color: var(--text-main); margin: 0; padding: 0; min-height: 100vh;
        }

        nav {
            background: rgba(11, 15, 24, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--surface-border); padding: 16px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-title { font-size: 1rem; font-weight: 800; letter-spacing: 1px; color: var(--accent-cyan); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        .panel { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        h3 { margin-top: 0; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }

        textarea { width: 100%; height: 280px; background: rgba(7, 10, 17, 0.85); border: 1px solid var(--surface-border); border-radius: 14px; color: white; padding: 15px; font-size: 1rem; resize: none; box-sizing: border-box; font-family: inherit; }
        textarea:focus { outline: none; border-color: var(--accent-purple); }

        .audio-input-box { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .audio-input-box label { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        audio { width: 100%; margin-top: 10px; }

        /* Estilos del Sincronizador en Vivo */
        .sync-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 2px dashed rgba(255,255,255,0.05); position: relative; padding: 20px; text-align: center; box-sizing: border-box; }
        .sync-area.recording { border-color: var(--accent-cyan); background: rgba(0, 242, 254, 0.02); }

        .current-lyric { font-size: 1.6rem; font-weight: 800; color: var(--text-secondary); transition: all 0.2s; max-width: 100%; }
        .current-lyric.holding { color: #fff; transform: scale(1.05); text-shadow: 0 0 20px var(--accent-cyan); }
        .next-lyric { font-size: 1rem; color: rgba(255,255,255,0.2); margin-top: 15px; font-style: italic; }

        .space-indicator { position: absolute; bottom: 20px; font-size: 0.8rem; font-weight: 700; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.05); letter-spacing: 0.5px; }
        .space-indicator.active { background: var(--accent-cyan); color: #04060a; font-weight: 800; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }

        .btn-start { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border: none; color: #04060a; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-top: 20px; transition: all 0.3s; }
        .btn-start:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Consola de Salida */
        .output-box { background: #070a11; border-radius: 14px; padding: 15px; font-family: monospace; font-size: 0.85rem; color: #a5b4fc; height: 350px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-title"><i data-lucide="layers" style="width: 16px; display: inline-block; vertical-align: middle; margin-right: 6px;"></i>SENDLYRICS // Sincronizador Oficial</div>
        <a href="home.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Volver al Inicio</a>
    </nav>

    <div class="container">
        <div class="panel">
            <h3><i data-lucide="file-text"></i> 1. Datos de la Pista</h3>
            <div style="margin-bottom: 15px;">
                <textarea id="rawLyrics" placeholder="Pega los versos aquí limpios (uno por línea)...&#10;&#10;Ejemplo:&#10;Agarré mi mochila, dejé todo atrás&#10;No sé pa' dónde voy pero sé que voy a llegar"></textarea>
            </div>
            
            <div class="audio-input-box">
                <label>Selecciona Archivo de Audio MP3</label>
                <input type="file" id="audioFile" accept="audio/*" style="color: var(--text-secondary);">
                <audio id="audioTrack" controls></audio>
            </div>

            <button class="btn-start" id="btnPrepare">
                <i data-lucide="play-circle"></i>
                <span>Preparar Sincronización</span>
            </button>
        </div>

        <div class="panel">
            <h3><i data-lucide="cpu"></i> 2. Controladores en Vivo</h3>
            
            <div class="sync-area" id="syncArea">
                <div class="current-lyric" id="currentLyricDisplay">Ninguna letra cargada</div>
                <div class="next-lyric" id="nextLyricDisplay">--</div>
                <div class="space-indicator" id="spaceIndicator">BARRA ESPACIADORA (SUELTA)</div>
            </div>

            <h3 style="margin-top: 30px; border: none; padding: 0;"><i data-lucide="code"></i> 3. Resultado Final JSON</h3>
            <div class="output-box" id="outputJson">// El código estructurado de tiempos aparecerá aquí...</div>
        </div>
    </div>

    <script>
        let linesArray = [];
        let currentLineIndex = 0;
        let synchronizedLines = [];
        let isSyncRunning = false;
        let currentStartTime = 0;

        const rawLyrics = document.getElementById('rawLyrics');
        const audioFile = document.getElementById('audioFile');
        const audioTrack = document.getElementById('audioTrack');
        const btnPrepare = document.getElementById('btnPrepare');
        const syncArea = document.getElementById('syncArea');
        const currentLyricDisplay = document.getElementById('currentLyricDisplay');
        const nextLyricDisplay = document.getElementById('nextLyricDisplay');
        const spaceIndicator = document.getElementById('spaceIndicator');
        const outputJson = document.getElementById('outputJson');

        // Cargar audio local dinámicamente
        audioFile.addEventListener('change', function(e){
            const file = e.target.files[0];
            if(file){
                audioTrack.src = URL.createObjectURL(file);
            }
        });

        // Configurar líneas listas para capturar datos
        btnPrepare.addEventListener('click', () => {
            const text = rawLyrics.value.trim();
            if(!text) { alert("Por favor inserta letras primero."); return; }
            
            // Separar renglones eliminando espacios vacíos
            linesArray = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            currentLineIndex = 0;
            synchronizedLines = [];
            isSyncRunning = true;
            
            updateDisplay();
            outputJson.textContent = "// Listos. Dale 'Play' al reproductor de audio y mantén presionado ESPACIO cuando empiece la primera línea.";
            audioTrack.focus();
        });

        function updateDisplay() {
            if (currentLineIndex < linesArray.length) {
                currentLyricDisplay.textContent = linesArray[currentLineIndex];
                currentLyricDisplay.style.opacity = "1";
                if (currentLineIndex + 1 < linesArray.length) {
                    nextLyricDisplay.textContent = "Siguiente: " + linesArray[currentLineIndex + 1];
                } else {
                    nextLyricDisplay.textContent = "Último verso";
                }
            } else {
                currentLyricDisplay.textContent = "¡Sincronización Terminada con Éxito!";
                nextLyricDisplay.textContent = "Revisa el JSON abajo.";
                isSyncRunning = false;
                exportJSON();
            }
        }

        // --- MANEJO DETALLADO DEL ESPACIO (PRESIONADO / SOLTADO) ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isSyncRunning) {
                // Evitar el scroll por defecto del navegador al presionar espacio
                e.preventDefault(); 
                
                if (e.repeat) return; // Evita disparos continuos repetidos del teclado

                currentStartTime = Math.round(audioTrack.currentTime);
                
                // Efecto visual activado
                currentLyricDisplay.classList.add('holding');
                spaceIndicator.classList.add('active');
                spaceIndicator.textContent = "GRABANDO TIEMPO... (MANTÉN PRESIONADO)";
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isSyncRunning) {
                e.preventDefault();

                // Quitar efectos visuales
                currentLyricDisplay.classList.remove('holding');
                spaceIndicator.classList.remove('active');
                spaceIndicator.textContent = "BARRA ESPACIADORA (SUELTA)";

                // Guardar la línea con el segundo en que se inició la pulsación
                synchronizedLines.push({
                    time: currentStartTime,
                    text: linesArray[currentLineIndex]
                });

                // Avanzar de verso
                currentLineIndex++;
                updateDisplay();
            }
        });

        function exportJSON() {
            // Formatea el código JSON limpio listo para meter a tu objeto general del karaoke.html
            const formattedJson = JSON.stringify(synchronizedLines, null, 4);
            outputJson.textContent = formattedJson;
        }

        lucide.createIcons();
    </script>
</body>
</html>
