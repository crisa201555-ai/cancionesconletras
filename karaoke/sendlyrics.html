<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizador Avanzado | SendLyrics</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #04060a;
            --surface: rgba(18, 24, 38, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2fe;
            --accent-purple: #9b51e0;
            --accent-red: #ff4d6d;
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 50% 0%, rgba(155, 81, 224, 0.05) 0px, transparent 50%);
            color: var(--text-main); margin: 0; padding: 0; min-height: 100vh;
        }

        nav {
            background: rgba(11, 15, 24, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--surface-border); padding: 16px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-title { font-size: 1rem; font-weight: 800; letter-spacing: 1px; color: var(--accent-cyan); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        .panel { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 20px; }
        h3 { margin: 0; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        select { width: 100%; padding: 14px; background: rgba(7, 10, 17, 0.85); border: 1px solid var(--surface-border); border-radius: 12px; color: white; font-size: 1rem; outline: none; cursor: pointer; font-weight: 600; }
        select option { background: #0b111e; color: #fff; }

        textarea { width: 100%; height: 220px; background: rgba(7, 10, 17, 0.85); border: 1px solid var(--surface-border); border-radius: 14px; color: white; padding: 15px; font-size: 1rem; resize: none; box-sizing: border-box; font-family: inherit; }
        textarea:focus { outline: none; border-color: var(--accent-purple); }

        audio { width: 100%; margin-top: 5px; }

        .btn-start { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border: none; color: #04060a; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; }
        .btn-start:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Consola del Sincronizador */
        .sync-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 260px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 2px dashed rgba(255,255,255,0.05); position: relative; padding: 20px; text-align: center; box-sizing: border-box; }
        
        .current-lyric { font-size: 1.5rem; font-weight: 800; color: var(--text-secondary); transition: all 0.2s; max-width: 100%; }
        .current-lyric.holding { color: #fff; transform: scale(1.04); text-shadow: 0 0 20px var(--accent-cyan); }
        .next-lyric { font-size: 0.95rem; color: rgba(255,255,255,0.2); margin-top: 12px; font-style: italic; }

        .space-indicator { position: absolute; bottom: 15px; font-size: 0.75rem; font-weight: 700; background: rgba(255,255,255,0.04); padding: 6px 14px; border-radius: 20px; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.05); }
        .space-indicator.active { background: var(--accent-cyan); color: #04060a; font-weight: 800; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }

        /* Botones de Control de Errores */
        .control-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-tool { background: rgba(255,255,255,0.03); border: 1px solid var(--surface-border); color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .btn-tool:hover { background: rgba(255,255,255,0.06); }
        .btn-tool.danger:hover { background: rgba(255, 77, 109, 0.1); border-color: var(--accent-red); color: var(--accent-red); }

        .output-box { background: #070a11; border-radius: 14px; padding: 15px; font-family: monospace; font-size: 0.85rem; color: #a5b4fc; height: 260px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); white-space: pre-wrap; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-title"><i data-lucide="layers" style="width: 16px; display: inline-block; vertical-align: middle; margin-right: 6px;"></i>SENDLYRICS // Sincronizador de Catálogo</div>
        <a href="home.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Volver al Inicio</a>
    </nav>

    <div class="container">
        <div class="panel">
            <h3><i data-lucide="music-2"></i> 1. Selección y Letra</h3>
            
            <div class="form-group">
                <label for="songSelector">Selecciona una Canción del Catálogo</label>
                <select id="songSelector">
                    <option value="" disabled selected>-- Elige una pista --</option>
                    <option value="sin-destino-fijo">Sin Destino Fijo (Debut)</option>
                    <option value="todo-es-feliz">Todo Es Feliz (ft. MCx)</option>
                    <option value="solo">Solo</option>
                    <option value="horizonte-neon">Horizonte de Neón</option>
                    <option value="concepcion">Concepción</option>
                    <option value="sin-frenos">Sin Frenos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Letra Limpia Editable</label>
                <textarea id="lyricsInput" placeholder="La letra aparecerá automáticamente al elegir una canción, o puedes escribir una propia aquí línea por línea..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Reproductor de Audio Vinculado</label>
                <audio id="audioElement" controls></audio>
            </div>

            <button class="btn-start" id="btnPrepare">
                <i data-lucide="activity"></i>
                <span>Montar en Sincronizador</span>
            </button>
        </div>

        <div class="panel">
            <h3><i data-lucide="sliders"></i> 2. Grabación en Vivo</h3>
            
            <div class="sync-area" id="syncArea">
                <div class="current-lyric" id="currentLyricDisplay">Selecciona una pista y móntala para empezar</div>
                <div class="next-lyric" id="nextLyricDisplay">--</div>
                <div class="space-indicator" id="spaceIndicator">BARRA ESPACIADORA DE CONTROL</div>
            </div>

            <div class="control-tools">
                <button class="btn-tool" id="btnUndoLine" title="Borra el tiempo del último verso capturado y retrocede el audio">
                    <i data-lucide="undo-2"></i>
                    <span>Borrar Último Verso</span>
                </button>
                <button class="btn-tool danger" id="btnResetAll">
                    <i data-lucide="trash-2"></i>
                    <span>Resetear Todo</span>
                </button>
            </div>

            <h3><i data-lucide="braces"></i> 3. Código JSON Generado</h3>
            <div class="output-box" id="jsonOutput">// El código con marcas de tiempo aparecerá aquí al finalizar...</div>
        </div>
    </div>

    <script>
        // Letras por defecto pre-cargadas basadas de forma exacta en tu material oficial
        const baseLetrasCatalogo = {
            "sin-destino-fijo": `Agarré mi mochila, dejé todo atrás
No sé pa' dónde voy pero sé que voy a llegar
El motor encendido, la mente en su lugar
El mundo es mi casa, no hay nada que temer
Salí de madrugada cuando el Sol ni apareció
Con la playlist lista y el tanque lleno, yo
Cada curva es un verso, cada ruta una canción
Viajando con el alma y el fuego en el corazón
Ciudades que no conozco, gente nueva pa' encontrar
Cada abrazo de extraño me recuerda respirar
No hay prisa, no hay reloj, solo el viento y la verdad
Soy libre cuando muevo y me alejo de la ciudad
Sin destino fijo, pero siempre adelante
Cada paso que doy me hace más gigante
La vida es el viaje, no el lugar de llegada
Voy con todo encendido y el alma desatada`,
            
            "todo-es-feliz": `Todo es feliz cuando estamos cantando
La música fluye, la gente bailando
MCx en el ritmo, ElCiaa rimando
Dejando los miedos que nos van frenando`,
            
            "solo": `Camino solo en esta gran ciudad
Buscando respuestas, buscando verdad
Pero no me detengo, mantengo el control
Sabiendo que pronto saldrá un nuevo Sol`,
            
            "horizonte-neon": `Horizonte de neón, las luces brillando
El futuro en mis manos se está diseñando`,
            
            "concepcion": `Recordando las calles donde todo empezó
La cuna del ritmo que me vio crecer yo`,
            
            "sin-frenos": `Acelerando el ritmo, voy sin frenar
Nadie en esta pista me va a parar`
        };

        let linesArray = [];
        let currentLineIndex = 0;
        let synchronizedLines = [];
        let isSyncRunning = false;
        let capturedTime = 0;

        const songSelector = document.getElementById('songSelector');
        const lyricsInput = document.getElementById('lyricsInput');
        const audioElement = document.getElementById('audioElement');
        const btnPrepare = document.getElementById('btnPrepare');
        const currentLyricDisplay = document.getElementById('currentLyricDisplay');
        const nextLyricDisplay = document.getElementById('nextLyricDisplay');
        const spaceIndicator = document.getElementById('spaceIndicator');
        const jsonOutput = document.getElementById('jsonOutput');
        
        const btnUndoLine = document.getElementById('btnUndoLine');
        const btnResetAll = document.getElementById('btnResetAll');

        // 1. Cambio de canción: Cambia MP3 y carga texto automáticamente
        songSelector.addEventListener('change', (e) => {
            const trackKey = e.target.value;
            if(baseLetrasCatalogo[trackKey]) {
                lyricsInput.value = baseLetrasCatalogo[trackKey];
                // Cambia automáticamente la pista de audio asignada
                audioElement.src = `${trackKey}.mp3`;
                jsonOutput.textContent = `// Se cargó el archivo ${trackKey}.mp3. Listo para montar.`;
            }
        });

        // 2. Montar datos en la consola activa
        btnPrepare.addEventListener('click', () => {
            const rawText = lyricsInput.value.trim();
            if(!rawText) { alert("Agrega o selecciona una letra primero."); return; }

            linesArray = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            currentLineIndex = 0;
            synchronizedLines = [];
            isSyncRunning = true;

            updateConsoleView();
            jsonOutput.textContent = "// Consola armada. Dale 'Play' al reproductor y mantén presionado ESPACIO al cantar cada verso.";
            audioElement.focus();
        });

        // 3. Renderizador de pantalla de versos
        function updateConsoleView() {
            if (currentLineIndex < linesArray.length) {
                currentLyricDisplay.textContent = linesArray[currentLineIndex];
                if (currentLineIndex + 1 < linesArray.length) {
                    nextLyricDisplay.textContent = "Siguiente: " + linesArray[currentLineIndex + 1];
                } else {
                    nextLyricDisplay.textContent = "Último verso de la pista";
                }
            } else {
                currentLyricDisplay.textContent = "¡Sincronización Completada con Éxito!";
                nextLyricDisplay.textContent = "--";
                isSyncRunning = false;
                buildFinalJSON();
            }
        }

        // 4. Captura interactiva usando la Barra de Espacio
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isSyncRunning) {
                e.preventDefault(); // Evita que baje la página con el espacio
                if (e.repeat) return;

                // Captura el segundo exacto en el momento inicial en que empieza la línea
                capturedTime = Math.round(audioElement.currentTime);

                currentLyricDisplay.classList.add('holding');
                spaceIndicator.classList.add('active');
                spaceIndicator.textContent = "CANTANDO... (MANTÉN PRESIONADO)";
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isSyncRunning) {
                e.preventDefault();

                currentLyricDisplay.classList.remove('holding');
                spaceIndicator.classList.remove('active');
                spaceIndicator.textContent = "BARRA ESPACIADORA (SUELTA)";

                // Guardar línea procesada
                synchronizedLines.push({
                    time: capturedTime,
                    text: linesArray[currentLineIndex]
                });

                currentLineIndex++;
                updateConsoleView();
                buildFinalJSON(); // Muestra el progreso en vivo en el cuadro de texto inferior
            }
        });

        // 5. BORRAR ÚLTIMO VERSO (Reseteo parcial inteligente)
        function undoLastLine() {
            if (synchronizedLines.length > 0 && isSyncRunning) {
                // Sacar el último elemento del historial
                const removedLine = synchronizedLines.pop();
                currentLineIndex--;

                // Retroceder el reproductor de música al punto donde se grabó esa línea para repetir bien
                audioElement.currentTime = Math.max(0, removedLine.time - 1);

                updateConsoleView();
                buildFinalJSON();
            }
        }

        btnUndoLine.addEventListener('click', undoLastLine);

        // Atajo de teclado: Si presionas la tecla de Borrar/Backspace en la página, hace el Undo automáticamente
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backspace' && isSyncRunning) {
                // Solo si no se está editando texto de forma manual en el cuadro
                if (document.activeElement !== lyricsInput) {
                    e.preventDefault();
                    undoLastLine();
                }
            }
        });

        // 6. RESETEAR TODO COMPLETO
        btnResetAll.addEventListener('click', () => {
            if(confirm("¿Seguro que quieres borrar todas las marcas de tiempo y empezar desde el segundo cero?")) {
                currentLineIndex = 0;
                synchronizedLines = [];
                if(linesArray.length > 0) isSyncRunning = true;
                audioElement.currentTime = 0;
                updateConsoleView();
                jsonOutput.textContent = "// Sincronización reiniciada. Lista desde el segundo 0.";
            }
        });

        // 7. Imprimir salida limpia en pantalla
        function buildFinalJSON() {
            jsonOutput.textContent = JSON.stringify(synchronizedLines, null, 4);
        }

        lucide.createIcons();
    </script>
</body>
</html>
